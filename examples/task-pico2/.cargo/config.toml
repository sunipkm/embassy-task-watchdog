[target.thumbv6m-none-eabi]
runner = "probe-rs run --no-location --chip RP2040"
#runner = "elf2uf2-rs -d"
#runner = "picotool load -u -v -x -t elf"

[target.thumbv8m.main-none-eabihf]
runner = "probe-rs run --no-location --chip RP235x"
#runner = "elf2uf2-rs -d"
#runner = "picotool load -u -v -x -t elf"

rustflags = [
    "-C",
    "link-arg=--nmagic",
    "-C",
    "link-arg=-Tlink.x",
    "-C",
    "link-arg=-Tdefmt.x",
]

[build]
target = "thumbv8m.main-none-eabihf" # RP2350x

[env]
DEFMT_LOG = "info"
EMBASSY_TASK_WATCHDOG_MAX_TASKS = "8"